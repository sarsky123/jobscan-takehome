# Render Blueprint: backend (Web Service) + frontend (Static Site).
# Index must be pre-built and committed (storage/vectors/, storage/documents/).
# After deploy, set OPENAI_API_KEY (sync: false), BACKEND_CORS_ORIGINS (frontend URL),
# and VITE_API_URL (backend URL) in the dashboard.

services:
  - type: web
    runtime: python
    name: jobscan-api
    buildCommand: pip install --no-cache-dir -r backend/requirements.txt
    startCommand: python -m backend.run
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false

  - type: web
    runtime: static
    name: jobscan-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
